<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Office of Us — Marketing</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F4EF;color:#1A1A1A;min-height:100vh;overflow-x:hidden}
  .wrap{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}

  .hdr{padding:1.25rem 1rem 1rem;border-bottom:1px solid #E8E4DF}
  .hdr-top{display:flex;justify-content:space-between;align-items:flex-start}
  .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#888;margin-bottom:2px}
  .hdr-title{font-size:21px;font-weight:600;color:#1A1A1A}
  .sync-btn{font-size:11px;color:#888;border:1px solid #DDD;border-radius:8px;padding:5px 10px;background:transparent;cursor:pointer}

  .stats{display:flex;gap:6px;padding:12px 1rem}
  .sp{flex:1;background:#F7F4EF;border-radius:10px;padding:8px 6px;text-align:center}
  .sn{font-size:22px;font-weight:600;display:block}
  .sl{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:#888;display:block;margin-top:2px}

  .section-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#BBB;margin-bottom:6px}

  .cal-wrap{padding:10px 1rem 6px}
  .cal-strip{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .cal-strip::-webkit-scrollbar{display:none}
  .cal-day{min-width:40px;height:56px;border-radius:10px;border:1px solid #E8E4DF;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;gap:3px;background:#fff;-webkit-tap-highlight-color:transparent}
  .cal-day.has-items{border-color:#C8C2BA}
  .cal-day.active{background:#1A1A1A;border-color:#1A1A1A}
  .cal-day.active .cal-dn,.cal-day.active .cal-dd{color:#fff}
  .cal-dn{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#999}
  .cal-dd{font-size:15px;font-weight:600;color:#1A1A1A;line-height:1}
  .cal-dots{display:flex;gap:2px;align-items:center;min-height:7px}
  .cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

  .filters{padding:10px 1rem 4px}
  .fbar{display:flex;gap:5px;flex-wrap:wrap}
  .ftab{border:1px solid #DDD;background:transparent;border-radius:20px;padding:6px 12px;font-size:12px;color:#888;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .ftab.on{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
  .cbar{display:flex;gap:5px;padding:8px 1rem 12px;flex-wrap:wrap}
  .ctab{border:1px solid #DDD;background:transparent;border-radius:8px;padding:5px 11px;font-size:11px;color:#888;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .ctab.on{border-color:#1A1A1A;color:#1A1A1A;font-weight:600}

  .cards{padding:0 1rem 4rem;display:flex;flex-direction:column;gap:10px}
  .card{background:#fff;border:1px solid #E8E4DF;border-radius:14px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s}
  .card:active{border-color:#C8C2BA;background:#FDFCFB}
  .card-img{width:100%;height:150px;object-fit:cover;display:block;border-bottom:1px solid #E8E4DF;background:#F7F4EF}
  .card-body{padding:13px 14px}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px}
  .card-title{font-size:14px;font-weight:600;color:#1A1A1A;line-height:1.35;flex:1}
  .sbadge{border-radius:20px;padding:4px 9px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0;letter-spacing:.04em;display:flex;align-items:center;gap:4px}
  .b-review{background:#FAEEDA;color:#7A4A08}
  .b-approved{background:#EAF3DE;color:#2E5F10}
  .b-live{background:#E6F1FB;color:#1255A0}
  .b-draft{background:#F2F0EC;color:#888}
  .card-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .chbadge{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#999;border:1px solid #E8E4DF;border-radius:7px;padding:2px 7px}
  .cdate{font-size:12px;color:#999}
  .card-note{font-size:12px;color:#666;margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-copy-preview{font-size:12px;color:#555;margin-top:8px;padding:8px 10px;background:#F7F4EF;border-radius:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-style:italic}
  .card-tap-hint{font-size:11px;color:#CCC;margin-top:9px}

  /* SLIDE-UP PANEL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:100;pointer-events:none;transition:background .25s}
  .overlay.open{background:rgba(0,0,0,.5);pointer-events:all}
  .panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;z-index:101;transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .panel.open{transform:translateX(-50%) translateY(0)}
  .panel-handle-wrap{display:flex;justify-content:center;padding:12px 0 0}
  .panel-handle{width:36px;height:4px;background:#E0DBDA;border-radius:2px}
  .panel-close{position:absolute;top:14px;right:16px;width:28px;height:28px;border-radius:50%;background:#F2F0EC;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#888;line-height:1}
  .panel-img{width:100%;max-height:240px;object-fit:cover;display:block;margin-top:14px;border-top:1px solid #F0EDE8;border-bottom:1px solid #F0EDE8}
  .panel-body{padding:16px 18px 48px}
  .panel-eyebrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
  .panel-title{font-size:20px;font-weight:700;color:#1A1A1A;line-height:1.3;margin-bottom:14px}
  .panel-section{margin-bottom:16px}
  .panel-section-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#BBB;margin-bottom:6px}
  .panel-note{font-size:14px;color:#444;line-height:1.65}
  .panel-copy{font-size:15px;color:#1A1A1A;line-height:1.7;background:#F7F4EF;border-radius:12px;padding:14px 16px;font-style:italic;border-left:3px solid #D8D0C8}
  .panel-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#1A6FC4;border:1px solid #BEDAF5;border-radius:10px;padding:9px 14px;text-decoration:none;margin-top:4px;background:#F4F9FF}

  .empty{text-align:center;padding:3rem 1rem;color:#999;font-size:14px}
  .loading{text-align:center;padding:3rem 1rem;color:#AAA;font-size:14px}
  .error-card{margin:1rem;padding:14px 16px;background:#FFF8F0;border:1px solid #F5D8B0;border-radius:14px;font-size:13px;color:#7A4A08;line-height:1.6}
  .error-card strong{display:block;margin-bottom:6px}
  code{background:#F0EDE8;padding:2px 5px;border-radius:4px;font-family:monospace;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <p class="eyebrow">The Office of Us</p>
        <p class="hdr-title" id="board-title">Marketing</p>
      </div>
      <button class="sync-btn" onclick="loadSheet()">⟳ Refresh</button>
    </div>
  </div>
  <div class="stats" id="stats"><div class="loading" style="width:100%">Loading...</div></div>
  <div id="main-content"></div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle-wrap"><div class="panel-handle"></div></div>
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-inner"></div>
</div>

<script>
const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQF02yiRT2ghLARVvbjFHMHVqulN89jn9h-_ZfE5QbFNsvOx_fvzVK-ZHVFe2NKxf0LSYZ6Kr3i7cti/pub?output=csv";
const DAY_NAMES=["Su","Mo","Tu","We","Th","Fr","Sa"];
const STATUS_META={
  review:{label:"Needs review",color:"#EF9F27",badge:"b-review"},
  approved:{label:"Approved",color:"#639922",badge:"b-approved"},
  live:{label:"Live",color:"#378ADD",badge:"b-live"},
  draft:{label:"In progress",color:"#C0BAB2",badge:"b-draft"},
};
let items=[],activeSt="all",activeCh="all",activeDay=null,calMonth=null,calYear=null;

function parseCSV(text){
  const lines=text.trim().split("\n");
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,"").toLowerCase());
  return lines.slice(1).map(line=>{
    const cols=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur);cur="";}
      else cur+=line[i];
    }
    cols.push(cur);
    const obj={};
    headers.forEach((h,i)=>obj[h]=(cols[i]||"").trim().replace(/^"|"$/g,""));
    return obj;
  }).filter(r=>r.title||r.Title);
}

function parseDate(str){
  if(!str)return{day:null,month:null,year:null,label:""};
  const d=new Date(str);
  if(!isNaN(d.getTime())){
    const a=new Date(d.getTime()+d.getTimezoneOffset()*60000);
    return{day:a.getDate(),month:a.getMonth(),year:a.getFullYear(),label:a.toLocaleDateString("en-US",{month:"short",day:"numeric"})};
  }
  return{day:null,month:null,year:null,label:str};
}

function loadSheet(){
  document.getElementById("stats").innerHTML='<div class="loading" style="width:100%">Syncing...</div>';
  document.getElementById("main-content").innerHTML="";
  fetch(SHEET_URL)
    .then(r=>{if(!r.ok)throw new Error();return r.text();})
    .then(text=>{
      const rows=parseCSV(text);
      if(!rows.length){
        document.getElementById("stats").innerHTML="";
        document.getElementById("main-content").innerHTML=`<div class="error-card"><strong>Sheet is empty</strong>Add rows with columns: <code>Title</code>, <code>Channel</code>, <code>Date</code>, <code>Status</code>, <code>Note</code>, <code>Copy</code>, <code>Image</code>, <code>Link</code></div>`;
        return;
      }
      items=rows.map((r,i)=>{
        const di=parseDate(r.date||r.Date||"");
        const rs=(r.status||r.Status||"draft").toLowerCase().trim();
        return{id:i,title:r.title||r.Title||"Untitled",channel:(r.channel||r.Channel||"").trim(),
          day:di.day,month:di.month,year:di.year,dateLabel:di.label,
          status:STATUS_META[rs]?rs:"draft",
          note:r.note||r.Note||"",copy:r.copy||r.Copy||"",
          image:r.image||r.Image||"",link:r.link||r.Link||r.url||r.URL||""};
      });
      const dated=items.filter(i=>i.month!==null);
      if(dated.length){
        const s=[...dated].sort((a,b)=>(a.year*12+a.month)-(b.year*12+b.month));
        const m=s[Math.floor(s.length/2)];calMonth=m.month;calYear=m.year;
      } else {const n=new Date();calMonth=n.getMonth();calYear=n.getFullYear();}
      document.getElementById("board-title").textContent=`${new Date(calYear,calMonth,1).toLocaleString("en-US",{month:"long"})} ${calYear} — Marketing`;
      renderAll();
    })
    .catch(()=>{
      document.getElementById("stats").innerHTML="";
      document.getElementById("main-content").innerHTML=`<div class="error-card"><strong>Couldn't load the sheet</strong>Make sure it's published via File → Share → Publish to web → CSV format.</div>`;
    });
}

function renderAll(){renderStats();renderMain();}

function renderStats(){
  const c={review:0,approved:0,live:0,draft:0};
  items.forEach(i=>c[i.status]=(c[i.status]||0)+1);
  document.getElementById("stats").innerHTML=`
    <div class="sp"><span class="sn" style="color:#BA7517">${c.review}</span><span class="sl">Need you</span></div>
    <div class="sp"><span class="sn" style="color:#3B6D11">${c.approved}</span><span class="sl">Approved</span></div>
    <div class="sp"><span class="sn" style="color:#185FA5">${c.live}</span><span class="sl">Live now</span></div>
    <div class="sp"><span class="sn" style="color:#888">${c.draft}</span><span class="sl">Coming up</span></div>`;
}

function renderMain(){
  const dim=new Date(calYear,calMonth+1,0).getDate();
  let calHTML="";
  for(let d=1;d<=dim;d++){
    const dt=new Date(calYear,calMonth,d);
    const di=items.filter(i=>i.day===d&&i.month===calMonth&&i.year===calYear);
    calHTML+=`<div class="cal-day${di.length?" has-items":""}${activeDay===d?" active":""}" onclick="setDay(${d})">
      <span class="cal-dn">${DAY_NAMES[dt.getDay()]}</span><span class="cal-dd">${d}</span>
      <div class="cal-dots">${di.map(i=>`<div class="cdot" style="background:${STATUS_META[i.status].color}"></div>`).join("")}</div>
    </div>`;
  }
  const channels=["all",...new Set(items.map(i=>i.channel).filter(Boolean))];
  const filtered=items.filter(i=>
    (activeSt==="all"||i.status===activeSt)&&
    (activeCh==="all"||i.channel===activeCh)&&
    (activeDay===null||(i.day===activeDay&&i.month===calMonth))
  );
  const cardsHTML=filtered.length?filtered.map(item=>{
    const m=STATUS_META[item.status];
    const imgBlock=item.image?`<img class="card-img" src="${item.image}" alt="" onerror="this.style.display='none'">`:""
    const copyPreview=(!item.image&&item.copy)?`<p class="card-copy-preview">${item.copy}</p>`:"";
    const notePreview=item.note?`<p class="card-note">${item.note}</p>`:"";
    return`<div class="card" onclick="openPanel(${item.id})">
      ${imgBlock}
      <div class="card-body">
        <div class="card-top">
          <p class="card-title">${item.title}</p>
          <span class="sbadge ${m.badge}"><span style="width:5px;height:5px;border-radius:50%;background:${m.color};display:inline-block;flex-shrink:0"></span>${m.label}</span>
        </div>
        <div class="card-meta">
          ${item.channel?`<span class="chbadge">${item.channel}</span>`:""}
          ${item.dateLabel?`<span class="cdate">${item.dateLabel}</span>`:""}
        </div>
        ${notePreview}${copyPreview}
        <p class="card-tap-hint">Tap for details ›</p>
      </div>
    </div>`;
  }).join(""):'<div class="empty">No items match this filter.</div>';

  document.getElementById("main-content").innerHTML=`
    <div class="cal-wrap">
      <p class="section-lbl">At a glance — tap a date</p>
      <div class="cal-strip">${calHTML}</div>
    </div>
    <div class="filters"><p class="section-lbl">Status</p>
      <div class="fbar">${[{k:"all",l:"All"},{k:"review",l:"Needs review"},{k:"approved",l:"Approved"},{k:"live",l:"Live"},{k:"draft",l:"In progress"}].map(f=>`<button class="ftab${activeSt===f.k?" on":""}" onclick="setSt('${f.k}')">${f.l}</button>`).join("")}</div>
    </div>
    <div class="cbar">${channels.map(c=>`<button class="ctab${activeCh===c?" on":""}" onclick="setCh('${c}')">${c==="all"?"All channels":c}</button>`).join("")}</div>
    <div class="cards">${cardsHTML}</div>`;
}

function openPanel(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const m=STATUS_META[item.status];
  document.getElementById("panel-inner").innerHTML=`
    ${item.image?`<img class="panel-img" src="${item.image}" alt="" onerror="this.style.display='none'">`:``}
    <div class="panel-body">
      <div class="panel-eyebrow">
        <span class="sbadge ${m.badge}"><span style="width:5px;height:5px;border-radius:50%;background:${m.color};display:inline-block"></span>${m.label}</span>
        ${item.channel?`<span class="chbadge">${item.channel}</span>`:""}
        ${item.dateLabel?`<span style="font-size:12px;color:#999">${item.dateLabel}</span>`:""}
      </div>
      <p class="panel-title">${item.title}</p>
      ${item.note?`<div class="panel-section"><p class="panel-section-lbl">Context</p><p class="panel-note">${item.note}</p></div>`:""}
      ${item.copy?`<div class="panel-section"><p class="panel-section-lbl">Copy</p><p class="panel-copy">${item.copy}</p></div>`:""}
      ${item.link?`<a class="panel-link" href="${item.link}" target="_blank">Open in XD / Drive ↗</a>`:""}
    </div>`;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("panel").classList.add("open");
  document.body.style.overflow="hidden";
}

function closePanel(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
  document.body.style.overflow="";
}

function setDay(d){activeDay=activeDay===d?null:d;renderMain();}
function setSt(s){activeSt=s;renderMain();}
function setCh(c){activeCh=c;renderMain();}

loadSheet();
</script>
</body>
</html>
